# SaaS Provider Verification TXT Record Rules
#
# Each rule defines how to identify a SaaS provider from DNS TXT records.
#
# Fields:
#   name:         SaaS provider name
#   category:     Provider category (e.g., collaboration, security, devops)
#   description:  Brief description of the provider
#   website:      Provider's website
#   match_type:   How to match the TXT record: prefix, substring, or regex
#   pattern:      The string or regex to match against
#   reference:    URL documenting the verification process (optional)
#
# Contributing:
#   Add new providers alphabetically within their category.
#   Use 'prefix' when the TXT record starts with a known string (most common).
#   Use 'substring' when the identifying string can appear anywhere.
#   Use 'regex' only when prefix/substring won't work.

---

# ── Identity & Access Management ─────────────────────────────────────────────

- name: Adobe IDP
  category: identity
  description: Enterprise SSO and identity federation for Adobe Creative Cloud and Document Cloud
  website: https://www.adobe.com
  match_type: prefix
  pattern: "adobe-idp-site-verification="
  impact: >-
    Compromised credentials grant access to all Adobe enterprise apps (Creative Cloud, Document Cloud), federated SSO to third-party services, and admin control over user provisioning and licensing
  reference: https://helpx.adobe.com/enterprise/using/verify-domain-ownership.html

- name: Apple Business
  category: identity
  description: Apple Business Manager for enterprise device enrollment and app distribution
  website: https://business.apple.com
  match_type: prefix
  pattern: "apple-domain-verification="
  impact: >-
    Compromised credentials grant access to Apple Business Manager , device enrollment, app purchasing, managed Apple IDs, and the ability to push MDM profiles to the entire device fleet
  reference: https://support.apple.com/guide/apple-business-manager/verify-domain

- name: Duo Security
  category: identity
  description: Multi-factor authentication (MFA) and single sign-on platform owned by Cisco
  website: https://duo.com
  match_type: prefix
  pattern: "duo_sso_verification="
  impact: >-
    Compromised admin credentials allow disabling MFA for targeted users, creating bypass codes, or modifying authentication policies , enabling silent access to all Duo-protected applications

- name: Microsoft 365
  category: identity
  description: Microsoft 365 suite including Exchange Online, SharePoint, Teams, and Azure AD
  website: https://www.microsoft.com/microsoft-365
  match_type: prefix
  pattern: "MS="
  impact: >-
    Compromised credentials grant access to email (Exchange Online), files (SharePoint/OneDrive), Teams chat history, and admin console for user management and mail flow rules

- name: Microsoft Domain
  category: identity
  description: Alternate Microsoft domain verification used for Azure and M365 services
  website: https://www.microsoft.com
  match_type: prefix
  pattern: "ms-domain-verification="
  impact: >-
    Compromised credentials grant access to Azure AD and M365 admin portals , user provisioning, mail routing, conditional access policies, and enterprise application registrations

- name: Okta
  category: identity
  description: Enterprise identity and access management platform providing SSO, MFA, and lifecycle management
  website: https://www.okta.com
  match_type: prefix
  pattern: "okta-domain-verification="
  impact: >-
    Compromised admin credentials provide access to the organization's entire SSO fabric , ability to impersonate any user, modify MFA policies, create backdoor accounts, and pivot into every connected application

