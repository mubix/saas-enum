# ── CDN & Infrastructure ─────────────────────────────────────────────────────

- name: Cloudflare
  category: cloud
  description: CDN, DDoS protection, DNS, and web application security platform
  website: https://www.cloudflare.com
  impact: >-
    Compromised credentials expose DNS management, firewall rules, DDoS
    settings, and cached content. Attacker could redirect traffic, disable
    protections, or intercept requests
  cname_targets:
    - "cdn.cloudflare.net"
  ns_targets:
    - "cloudflare.com"

- name: AWS CloudFront
  category: cloud
  description: Amazon Web Services content delivery network
  website: https://aws.amazon.com/cloudfront/
  impact: >-
    Compromised AWS credentials expose CloudFront distributions, origin
    configurations, and the ability to modify content delivery or redirect
    traffic. Dangling CNAME to unclaimed CloudFront distributions enables
    full content takeover
  cname_targets:
    - "cloudfront.net"

- name: Azure CDN
  category: cloud
  description: Microsoft Azure content delivery network and web app hosting
  website: https://azure.microsoft.com
  impact: >-
    Compromised Azure credentials expose CDN configurations, web app deployments,
    and the ability to modify hosted applications. Dangling CNAMEs to unclaimed
    Azure resources enable subdomain takeover
  cname_targets:
    - "azureedge.net"
    - "azurewebsites.net"
    - "azure-api.net"
    - "cloudapp.azure.com"
    - "azurefd.net"
    - "blob.core.windows.net"
    - "azurestaticapps.net"

- name: Fastly
  category: cloud
  description: Edge cloud platform for CDN, security, and compute
  website: https://www.fastly.com
  impact: >-
    Compromised credentials expose CDN configurations, edge computing logic,
    TLS certificates, and cached content. Dangling Fastly CNAMEs can be
    claimed by any Fastly customer
  cname_targets:
    - "fastly.net"
    - "fastlylb.net"
    - "a]global-ssl.fastly.net"

- name: Akamai
  category: cloud
  description: Global CDN and cybersecurity platform
  website: https://www.akamai.com
  impact: >-
    Compromised credentials expose CDN configurations, WAF rules, bot management
    policies, and origin server details
  cname_targets:
    - "akamaized.net"
    - "akamai.net"
    - "akamaiedge.net"
    - "edgesuite.net"
    - "edgekey.net"

