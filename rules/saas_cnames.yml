- name: GitHub Pages
  category: devtools
  description: Static site hosting from GitHub repositories
  website: https://pages.github.com
  impact: >-
    Dangling SaaS: unclaimed GitHub Pages CNAME allows any GitHub user to serve
    content on the organization's subdomain by creating a matching repository
  cname_targets:
    - "github.io"
    - "githubusercontent.com"
  subdomains_to_check:
    - docs
    - developer
    - dev

- name: Heroku
  category: devtools
  description: Cloud application platform (PaaS) for deploying, managing, and scaling web apps
  website: https://www.heroku.com
  impact: >-
    Dangling SaaS: unclaimed Heroku app CNAMEs can be registered by any Heroku
    user, serving malicious content on the organization's subdomain.
    Compromised credentials expose deployed applications, environment variables
    containing secrets, and deployment pipelines
  cname_targets:
    - "herokuapp.com"
    - "herokussl.com"
    - "herokudns.com"
  subdomains_to_check:
    - app
    - api
    - staging

- name: Netlify
  category: devtools
  description: Web hosting and serverless functions platform for JAMstack sites
  website: https://www.netlify.com
  impact: >-
    Dangling SaaS: unclaimed Netlify site CNAMEs can be claimed, allowing
    content takeover on the organization's subdomain
  cname_targets:
    - "netlify.app"
    - "netlify.com"
    - "bitballoon.com"

- name: Vercel
  category: devtools
  description: Frontend deployment platform for Next.js and static sites
  website: https://vercel.com
  impact: >-
    Dangling SaaS: unclaimed Vercel deployment CNAMEs can be claimed by creating
    a project with the matching domain configuration
  cname_targets:
    - "vercel.app"
    - "now.sh"
    - "vercel-dns.com"

