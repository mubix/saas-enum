# SaaS Provider CNAME Detection Rules
#
# These rules detect SaaS providers by checking whether an organization's
# subdomains resolve (via CNAME, A, or NS) to known provider infrastructure.
#
# This is a different detection technique than TXT verification records.
# TXT records prove deliberate domain verification; CNAME records prove
# active service integration. Both are valuable signals.
#
# Fields:
#   name:           SaaS provider name (should match saas_providers.yml if a TXT rule exists)
#   category:       Provider category
#   description:    What the provider does
#   website:        Provider website
#   impact:         Security impact of credential compromise or Dangling SaaS
#
#   cname_targets:  List of domain suffixes that indicate this provider.
#                   If a subdomain's CNAME (or CNAME chain) ends at a domain
#                   matching any of these suffixes, the provider is detected.
#                   Use the bare domain (e.g. "zendesk.com") not a wildcard.
#
#   subdomains_to_check:
#                   Common subdomain names that organizations use when
#                   integrating this provider. The tool will look up
#                   {name}.{target_domain} for each entry.
#                   Keep this list short and high-confidence.
#
#   mx_targets:     (Optional) Domain suffixes in MX records that indicate
#                   this provider. Checked against the target domain's MX
#                   records. Use for email/communication providers.
#
#   ns_targets:     (Optional) Domain suffixes in NS records for delegated
#                   subdomains. Use for providers that host entire subzones
#                   (e.g. Shopify, WordPress.com).
#
#   ip_ranges:      (Optional) Known IP CIDR ranges for the provider.
#                   If a subdomain resolves to an IP in these ranges, the
#                   provider is detected. Use sparingly; IPs change.
#
# Contributing:
#   The easiest contribution is adding cname_targets and subdomains_to_check
#   for a provider you know. Run `dig CNAME support.bigcorp.com` on a domain
#   you know uses the provider and note where it points.
#
#   If you're unsure about subdomains_to_check, just add cname_targets.
#   The tool will still detect the provider if discovered through zone
#   walking or other subdomain enumeration.

---

# ── Identity & Access Management ─────────────────────────────────────────────

- name: Okta
  category: identity
  description: Enterprise identity and access management platform providing SSO, MFA, and lifecycle management
  website: https://www.okta.com
  impact: >-
    Compromised admin credentials provide access to the organization's entire
    SSO fabric, with the ability to impersonate any user, modify MFA policies,
    create backdoor accounts, and pivot into every connected application
  cname_targets:
    - "okta.com"
    - "oktapreview.com"
    - "okta-emea.com"
    - "okta-dnssec.com"
    - "trexcloud.com"
  subdomains_to_check:
    - sso
    - login
    - id
    - auth
    - identity

- name: Auth0
  category: identity
  description: Identity platform for authentication and authorization (owned by Okta)
  website: https://auth0.com
  impact: >-
    Compromised admin credentials expose the authentication layer, including
    user databases, login flows, social connections, and the ability to modify
    authentication rules affecting all applications
  cname_targets:
    - "auth0.com"
    - "us.auth0.com"
    - "eu.auth0.com"
    - "au.auth0.com"
  subdomains_to_check:
    - auth
    - login
    - sso
    - id

- name: OneLogin
  category: identity
  description: Cloud-based identity and access management with SSO and MFA
  website: https://www.onelogin.com
  impact: >-
    Compromised admin credentials allow managing all SSO-connected applications,
    creating backdoor accounts, and modifying authentication policies
  cname_targets:
    - "onelogin.com"
  subdomains_to_check:
    - sso
    - login
    - onelogin

- name: Ping Identity
  category: identity
  description: Enterprise identity security platform for SSO, MFA, and API security
  website: https://www.pingidentity.com
  impact: >-
    Compromised credentials expose the identity fabric connecting all enterprise
    applications, with the ability to modify federation settings and access policies
  cname_targets:
    - "pingidentity.com"
    - "pingone.com"
    - "connect.pingidentity.com"
  subdomains_to_check:
    - sso
    - login
    - auth
    - federation

